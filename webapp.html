<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AndTaxi — Joylashuv</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0f0f1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff}

/* ===== XARITA ===== */
#map{
  position:fixed;inset:0;z-index:1;
  background:#1a1a2e;
}
.leaflet-tile-pane{filter:brightness(.85) saturate(.9) hue-rotate(200deg)}

/* ===== MARKAZIY PIN ===== */
#pin-container{
  position:fixed;
  left:50%;top:50%;
  transform:translate(-50%,-100%);
  z-index:10;
  pointer-events:none;
  transition:transform .15s ease;
}
#pin-container.dragging{transform:translate(-50%,-110%)}
#pin-icon{
  width:44px;height:44px;
  background:linear-gradient(135deg,#f5c518,#ff6b35);
  border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);
  box-shadow:0 4px 20px rgba(245,197,24,.45);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
#pin-icon::after{
  content:'';position:absolute;
  width:14px;height:14px;
  background:#0f0f1a;border-radius:50%;
}
#pin-shadow{
  width:16px;height:6px;
  background:rgba(0,0,0,.4);
  border-radius:50%;
  margin:2px auto 0;
  filter:blur(2px);
  transition:all .15s ease;
}
#pin-container.dragging #pin-shadow{
  width:10px;opacity:.3;margin-top:6px;
}

/* ===== GPS TUGMA ===== */
#gps-btn{
  position:fixed;right:16px;
  z-index:20;
  width:48px;height:48px;
  background:#1a1a2e;
  border:1px solid #2a2a4a;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
  font-size:22px;
  transition:all .2s;
  bottom:280px;
}
#gps-btn:active{background:#2a2a4a;transform:scale(.93)}
#gps-btn.locating{animation:pulse-btn 1s infinite}
@keyframes pulse-btn{0%,100%{box-shadow:0 4px 16px rgba(0,0,0,.5)}50%{box-shadow:0 4px 24px rgba(245,197,24,.4)}}

/* ===== PASTKI PANEL ===== */
#bottom-panel{
  position:fixed;bottom:0;left:0;right:0;
  z-index:20;
  background:#0f0f1a;
  border-top:1px solid #1e1e36;
  border-radius:24px 24px 0 0;
  padding:12px 16px 32px;
  box-shadow:0 -8px 40px rgba(0,0,0,.6);
}

/* Drag tutqich */
.drag-handle{
  width:40px;height:4px;
  background:#2a2a4a;border-radius:2px;
  margin:0 auto 14px;
}

/* Manzil qatori */
.addr-row{
  display:flex;align-items:center;gap:10px;
  background:#1a1a2e;
  border:1px solid #2a2a4a;
  border-radius:14px;
  padding:12px 14px;
  margin-bottom:10px;
  min-height:52px;
}
.addr-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
}
.addr-dot.pickup{background:#4caf50}
.addr-dot.dest{background:#f5c518}
.addr-text{flex:1;font-size:14px;line-height:1.3;color:#fff}
.addr-text.placeholder{color:#555}
.addr-edit{
  font-size:11px;color:#f5c518;
  padding:4px 8px;border:1px solid #f5c51844;
  border-radius:8px;white-space:nowrap;cursor:pointer;
  background:none;flex-shrink:0;
}

/* Mode switcher */
.mode-row{
  display:flex;gap:8px;margin-bottom:12px;
}
.mode-btn{
  flex:1;padding:9px;border:none;border-radius:12px;
  font-size:12px;font-weight:700;cursor:pointer;
  transition:all .2s;
}
.mode-btn.active{background:linear-gradient(135deg,#f5c518,#ff6b35);color:#000}
.mode-btn:not(.active){background:#1a1a2e;color:#888;border:1px solid #2a2a4a}

/* Asosiy tugma */
#confirm-btn{
  width:100%;padding:15px;border:none;
  border-radius:16px;font-size:16px;font-weight:800;
  background:linear-gradient(135deg,#f5c518,#ff6b35);
  color:#000;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 20px rgba(245,197,24,.3);
}
#confirm-btn:active{transform:scale(.97);box-shadow:0 2px 10px rgba(245,197,24,.2)}
#confirm-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* Koordinata ko'rsatgich */
#coord-badge{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:20;
  background:rgba(10,10,20,.85);
  backdrop-filter:blur(8px);
  border:1px solid #2a2a4a;
  border-radius:20px;
  padding:6px 14px;
  font-size:11px;color:#888;
  pointer-events:none;
  white-space:nowrap;
  transition:opacity .3s;
}

/* Izlash panel (pastki panel ustida) */
#search-overlay{
  position:fixed;inset:0;z-index:30;
  background:rgba(0,0,0,.7);
  display:none;align-items:flex-end;
}
#search-box{
  width:100%;background:#0f0f1a;
  border-radius:24px 24px 0 0;
  padding:16px 16px 40px;
  max-height:80vh;overflow-y:auto;
}
#search-inp{
  width:100%;padding:13px 14px;
  background:#1a1a2e;border:1px solid #3a3a5a;
  border-radius:12px;color:#fff;font-size:15px;
  outline:none;margin-bottom:12px;
}
#search-inp::placeholder{color:#555}
.search-result{
  padding:12px 0;border-bottom:1px solid #1e1e36;
  cursor:pointer;display:flex;align-items:center;gap:10px;
}
.search-result:last-child{border-bottom:none}
.search-result:active{opacity:.7}
.sr-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.sr-name{font-size:14px;font-weight:600}
.sr-sub{font-size:12px;color:#888;margin-top:2px}
.search-close{
  background:none;border:none;color:#888;
  font-size:13px;cursor:pointer;
  float:right;padding:4px 8px;
}

/* Toast */
#toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  z-index:50;background:#1a3a1a;color:#4caf50;
  border:1px solid #4caf5066;border-radius:20px;
  padding:8px 18px;font-size:13px;font-weight:600;
  opacity:0;transition:opacity .3s;pointer-events:none;
  white-space:nowrap;
}
#toast.show{opacity:1}
#toast.err{background:#3a1a1a;color:#f44336;border-color:#f4433666}

/* Leaflet override */
.leaflet-control-attribution{display:none}
.leaflet-control-zoom{display:none}
</style>
</head>
<body>

<!-- Xarita -->
<div id="map"></div>

<!-- Markaziy pin -->
<div id="pin-container">
  <div id="pin-icon"></div>
  <div id="pin-shadow"></div>
</div>

<!-- Koordinata badge -->
<div id="coord-badge">📍 Joylashuv aniqlanmoqda...</div>

<!-- GPS tugma -->
<button id="gps-btn" onclick="goToMyLocation()" title="Mening joylashuvim">📍</button>

<!-- Pastki panel -->
<div id="bottom-panel">
  <div class="drag-handle"></div>

  <!-- Olib ketish joyi -->
  <div class="addr-row" id="pickup-row" onclick="openSearch('pickup')">
    <div class="addr-dot pickup"></div>
    <div class="addr-text placeholder" id="pickup-text">Manzilni belgilang yoki xaritadan tanlang</div>
    <button class="addr-edit" onclick="event.stopPropagation();openSearch('pickup')">✏️ Tahrir</button>
  </div>

  <!-- Borish joyi -->
  <div class="addr-row" id="dest-row" onclick="openSearch('dest')">
    <div class="addr-dot dest"></div>
    <div class="addr-text placeholder" id="dest-text">Borish manzili</div>
    <button class="addr-edit" onclick="event.stopPropagation();openSearch('dest')">✏️ Tahrir</button>
  </div>

  <!-- Mode tanlash -->
  <div class="mode-row">
    <button class="mode-btn active" id="mode-pickup" onclick="setMode('pickup')">📍 Mening joyim</button>
    <button class="mode-btn" id="mode-dest" onclick="setMode('dest')">🏁 Borish joyi</button>
  </div>

  <!-- Tasdiqlash -->
  <button id="confirm-btn" onclick="confirmLocation()" disabled>
    Joylashuvni tasdiqlash →
  </button>
</div>

<!-- Izlash overlay -->
<div id="search-overlay" onclick="closeSearch(event)">
  <div id="search-box">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <div style="font-size:14px;font-weight:700;flex:1" id="search-title">Manzil kiriting</div>
      <button class="search-close" onclick="closeSearch()">✕ Yopish</button>
    </div>
    <input id="search-inp" placeholder="Ko'cha, joy nomi..." oninput="onSearch(this.value)">
    <div id="search-results"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ===== TELEGRAM SETUP =====
const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); tg.setHeaderColor?.('#0f0f1a'); }

// ===== STATE =====
let map, currentMode = 'pickup';
let pickupMarker = null, destMarker = null;
let pickupCoord = null, destCoord = null;
let pickupAddr = '', destAddr = '';
let isDragging = false;
let reverseTimeout = null;

// Andijon markazi (default)
const ANDIJON_CENTER = [40.7831, 72.3442];
const TOSHKENT_CENTER = [41.2995, 69.2401];

// ===== XARITA INIT =====
function initMap(){
  map = L.map('map', {
    center: ANDIJON_CENTER,
    zoom: 14,
    zoomControl: false,
    attributionControl: false,
  });

  // OpenStreetMap tiles (bepul, lekin yaxshi ko'rinish)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19, minZoom:10
  }).addTo(map);

  // Xarita harakatlanayotganda
  map.on('movestart', ()=>{
    isDragging = true;
    document.getElementById('pin-container').classList.add('dragging');
    clearTimeout(reverseTimeout);
  });

  map.on('move', ()=>{
    updateCoordBadge(map.getCenter());
  });

  map.on('moveend', ()=>{
    isDragging = false;
    document.getElementById('pin-container').classList.remove('dragging');
    const center = map.getCenter();
    updateCoordBadge(center);
    reverseGeocode(center.lat, center.lng);
  });

  // GPS bilan boshlash
  goToMyLocation();
}

// ===== GPS — O'Z JOYLASHUVIM =====
function goToMyLocation(){
  const btn = document.getElementById('gps-btn');
  btn.classList.add('locating');
  btn.textContent = '⏳';

  navigator.geolocation.getCurrentPosition(
    pos=>{
      btn.classList.remove('locating');
      btn.textContent = '📍';
      const latlng = [pos.coords.latitude, pos.coords.longitude];
      map.setView(latlng, 16, {animate:true, duration:.8});
    },
    err=>{
      btn.classList.remove('locating');
      btn.textContent = '📍';
      // GPS yo'q bo'lsa Andijon markazi
      map.setView(ANDIJON_CENTER, 14, {animate:true});
      toast('GPS ruxsati yo\'q — xaritadan belgilang', 'err');
    },
    {timeout:8000, enableHighAccuracy:true}
  );
}

// ===== KOORDINATA BADGE =====
function updateCoordBadge(latlng){
  const el = document.getElementById('coord-badge');
  const lat = latlng.lat.toFixed(5);
  const lng = latlng.lng.toFixed(5);
  el.textContent = `${lat}, ${lng}`;
}

// ===== TESKARI GEOCODING (koordinata → manzil) =====
async function reverseGeocode(lat, lng){
  try{
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lng=${lng}&format=json&accept-language=uz`,
      {headers:{'Accept-Language':'uz,ru'}}
    );
    const d = await r.json();
    const addr = formatAddress(d.address, d.display_name);

    if(currentMode === 'pickup'){
      pickupCoord = {lat, lng};
      pickupAddr = addr;
      updatePickupUI(addr);
    } else {
      destCoord = {lat, lng};
      destAddr = addr;
      updateDestUI(addr);
    }
    checkConfirmBtn();
  } catch(e){
    // Nominatim ishlamasa koordinata ko'rsat
    const coord = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    if(currentMode === 'pickup'){
      pickupCoord = {lat, lng};
      pickupAddr = coord;
      updatePickupUI(coord);
    } else {
      destCoord = {lat, lng};
      destAddr = coord;
      updateDestUI(coord);
    }
    checkConfirmBtn();
  }
}

function formatAddress(addr, fallback){
  if(!addr) return fallback;
  const parts = [];
  if(addr.road || addr.pedestrian) parts.push(addr.road || addr.pedestrian);
  if(addr.house_number) parts[0] = parts[0] + ' ' + addr.house_number;
  if(addr.suburb) parts.push(addr.suburb);
  if(addr.city || addr.town || addr.village) parts.push(addr.city || addr.town || addr.village);
  return parts.length ? parts.join(', ') : fallback.split(',').slice(0,2).join(',');
}

// ===== UI YANGILASH =====
function updatePickupUI(addr){
  const el = document.getElementById('pickup-text');
  el.textContent = addr || 'Joylashuv tanlanmadi';
  el.classList.toggle('placeholder', !addr);
  // Xaritada yashil marker
  if(pickupMarker) map.removeLayer(pickupMarker);
  if(pickupCoord){
    pickupMarker = L.circleMarker([pickupCoord.lat, pickupCoord.lng], {
      radius:8, color:'#4caf50', fillColor:'#4caf50', fillOpacity:1, weight:3,
      stroke:true
    }).addTo(map);
  }
}

function updateDestUI(addr){
  const el = document.getElementById('dest-text');
  el.textContent = addr || 'Manzil kiritilmadi';
  el.classList.toggle('placeholder', !addr);
  // Xaritada sariq marker
  if(destMarker) map.removeLayer(destMarker);
  if(destCoord){
    destMarker = L.circleMarker([destCoord.lat, destCoord.lng], {
      radius:8, color:'#f5c518', fillColor:'#f5c518', fillOpacity:1, weight:3,
    }).addTo(map);
    // Ikkita marker bo'lsa ikkalasini sig'diring
    if(pickupMarker){
      const bounds = L.latLngBounds([
        [pickupCoord.lat, pickupCoord.lng],
        [destCoord.lat, destCoord.lng]
      ]);
      map.fitBounds(bounds, {padding:[80,80], animate:true, duration:.8});
    }
  }
}

// ===== MODE SWITCH =====
function setMode(mode){
  currentMode = mode;
  document.getElementById('mode-pickup').classList.toggle('active', mode==='pickup');
  document.getElementById('mode-dest').classList.toggle('active', mode==='dest');

  // Agar mavjud koordinata bo'lsa shu joyga o't
  if(mode==='pickup' && pickupCoord){
    map.setView([pickupCoord.lat, pickupCoord.lng], 16, {animate:true});
  } else if(mode==='dest' && destCoord){
    map.setView([destCoord.lat, destCoord.lng], 16, {animate:true});
  } else if(mode==='dest'){
    // Dest uchun Toshkent markaziga o't (Andijon→Toshkent)
    map.setView(TOSHKENT_CENTER, 13, {animate:true});
  }

  const hint = mode==='pickup'
    ? 'Xaritani suring — mening joyim'
    : 'Xaritani suring — borish joyi';
  toast(hint);
}

// ===== TASDIQLASH TUGMA =====
function checkConfirmBtn(){
  const btn = document.getElementById('confirm-btn');
  if(pickupCoord && destCoord){
    btn.disabled = false;
    btn.textContent = '🚕 Taksi chaqirish →';
  } else if(pickupCoord){
    btn.disabled = false;
    btn.textContent = 'Borish joyini belgilang →';
    btn.onclick = ()=>{ setMode('dest'); };
    return;
  }
  btn.onclick = confirmLocation;
}

function confirmLocation(){
  if(!pickupCoord){
    toast('Avval manzilni belgilang!', 'err'); return;
  }
  if(!destCoord){
    setMode('dest');
    toast('Endi borish joyini belgilang', 'err'); return;
  }

  const data = {
    action: 'location_selected',
    pickup: { lat: pickupCoord.lat, lng: pickupCoord.lng, address: pickupAddr },
    destination: { lat: destCoord.lat, lng: destCoord.lng, address: destAddr }
  };

  if(tg?.sendData){
    tg.sendData(JSON.stringify(data));
  } else {
    // Test uchun
    alert('Yuboriladi:\n' + JSON.stringify(data, null, 2));
  }
}

// ===== IZLASH =====
let searchMode = 'pickup';
function openSearch(mode){
  searchMode = mode;
  const overlay = document.getElementById('search-overlay');
  document.getElementById('search-title').textContent =
    mode==='pickup' ? '📍 Olib ketish joyi' : '🏁 Borish joyi';
  document.getElementById('search-inp').value = '';
  document.getElementById('search-results').innerHTML = quickSuggestions(mode);
  overlay.style.display = 'flex';
  setTimeout(()=> document.getElementById('search-inp').focus(), 100);
}

function closeSearch(e){
  if(!e || e.target.id==='search-overlay' || !e.target){
    document.getElementById('search-overlay').style.display = 'none';
    document.getElementById('search-inp').blur();
  }
}

function quickSuggestions(mode){
  const items = mode==='pickup' ? [
    {icon:'🏠', name:'Uyim', sub:'Saqlangan manzil', lat:40.7831, lng:72.3442},
    {icon:'📍', name:'Hozirgi joylashuv', sub:'GPS orqali', lat:null, lng:null, gps:true},
    {icon:'🏙️', name:'Andijon markazi', sub:'Babur xiyoboni', lat:40.7831, lng:72.3442},
  ] : [
    {icon:'✈️', name:'Toshkent aeroporti', sub:'Yunusobod', lat:41.2579, lng:69.2814},
    {icon:'🚉', name:'Toshkent temir yo\'l', sub:'Amir Temur xiyoboni', lat:41.2956, lng:69.2797},
    {icon:'🏙️', name:'Toshkent markazi', sub:'Mustaqillik maydoni', lat:41.2995, lng:69.2401},
    {icon:'🏥', name:'Respublika shifoxonasi', sub:'Farob ko\'chasi', lat:41.3087, lng:69.2785},
  ];

  return items.map(i=>`
    <div class="search-result" onclick="selectSuggestion(${i.lat},${i.lng},'${i.name}',${!!i.gps})">
      <div class="sr-icon">${i.icon}</div>
      <div>
        <div class="sr-name">${i.name}</div>
        <div class="sr-sub">${i.sub}</div>
      </div>
    </div>
  `).join('');
}

let searchTO;
async function onSearch(q){
  clearTimeout(searchTO);
  if(q.length < 3){
    document.getElementById('search-results').innerHTML = quickSuggestions(searchMode);
    return;
  }
  searchTO = setTimeout(async()=>{
    const res = document.getElementById('search-results');
    res.innerHTML = '<div style="color:#888;font-size:13px;padding:12px 0">Qidirilmoqda...</div>';
    try{
      const r = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&accept-language=uz&countrycodes=uz`
      );
      const data = await r.json();
      if(!data.length){
        res.innerHTML = '<div style="color:#888;font-size:13px;padding:12px 0">Natija topilmadi</div>';
        return;
      }
      res.innerHTML = data.map(d=>`
        <div class="search-result" onclick="selectSuggestion(${d.lat},${d.lon},'${d.display_name.split(',')[0]}',false)">
          <div class="sr-icon">📌</div>
          <div>
            <div class="sr-name">${d.display_name.split(',')[0]}</div>
            <div class="sr-sub">${d.display_name.split(',').slice(1,3).join(',')}</div>
          </div>
        </div>
      `).join('');
    }catch(e){
      res.innerHTML = '<div style="color:#f44336;font-size:13px;padding:12px 0">Internet xatosi</div>';
    }
  }, 400);
}

function selectSuggestion(lat, lng, name, isGps){
  document.getElementById('search-overlay').style.display = 'none';
  if(isGps){
    goToMyLocation(); return;
  }
  const latlng = [parseFloat(lat), parseFloat(lng)];
  map.setView(latlng, 16, {animate:true});

  // Darhol belgilash
  if(searchMode==='pickup'){
    pickupCoord = {lat:parseFloat(lat), lng:parseFloat(lng)};
    pickupAddr = name;
    updatePickupUI(name);
    currentMode = 'pickup';
  } else {
    destCoord = {lat:parseFloat(lat), lng:parseFloat(lng)};
    destAddr = name;
    updateDestUI(name);
    currentMode = 'dest';
  }
  checkConfirmBtn();
  toast('✅ ' + name);
}

// ===== TOAST =====
function toast(msg, type='ok'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type==='err' ? ' err' : '');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), 2200);
}

// ===== ISHGA TUSHIRISH =====
window.addEventListener('load', initMap);
</script>
</body>
</html>
