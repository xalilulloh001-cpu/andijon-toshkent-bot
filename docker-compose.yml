version: '3.8'

services:
  # ===== PostgreSQL Database =====
  postgres:
    image: postgres:15-alpine
    container_name: anditaxi_postgres
    environment:
      POSTGRES_DB: anditaxi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - anditaxi_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ===== Redis Cache =====
  redis:
    image: redis:7-alpine
    container_name: anditaxi_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - anditaxi_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ===== Telegram Bot =====
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: anditaxi_bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ADMIN_IDS: ${ADMIN_IDS}
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/anditaxi
      REDIS_URL: redis://redis:6379
      SMS_API_KEY: ${SMS_API_KEY}
      SMS_API_URL: ${SMS_API_URL}
      WEBSOCKET_URL: ${WEBSOCKET_URL}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - anditaxi_network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # ===== WebSocket Server =====
  websocket:
    build:
      context: .
      dockerfile: Dockerfile.websocket
    container_name: anditaxi_websocket
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/anditaxi
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - anditaxi_network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # ===== Nginx Reverse Proxy =====
  nginx:
    image: nginx:alpine
    container_name: anditaxi_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./webapp:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - websocket
      - bot
    networks:
      - anditaxi_network
    restart: unless-stopped

networks:
  anditaxi_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
