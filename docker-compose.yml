version: '3.8'

services:
  bot:
    build: .
    restart: always
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DATABASE_URL=postgresql://taxibot:taxibot123@db:5432/taxibot
      - ADMIN_IDS=${ADMIN_IDS}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: taxibot
      POSTGRES_USER: taxibot
      POSTGRES_PASSWORD: taxibot123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxibot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
